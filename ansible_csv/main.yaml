---
- name: Read and Process CSV File on Localhost
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    csv_file_path: "test9.csv"  # Update this to your actual CSV file path

  tasks:
    - name: Check if CSV file exists
      stat:
        path: "{{ csv_file_path }}"
      register: csv_file_stat

    - name: Fail if CSV file doesn't exist
      fail:
        msg: "CSV file not found at {{ csv_file_path }}"
      when: not csv_file_stat.stat.exists

    - name: Read CSV file
      community.general.read_csv:
        path: "{{ csv_file_path }}"
        delimiter: ","
      register: csv_data

    - name: Convert IP string and Port string to lists
      set_fact:
        processed_data: "{{ processed_data | default([]) + 
          [item | combine({
            'dst_ip': (item['DST_IP'] | default('')).split(',') | map('trim') | list,
            'src_ip': (item['SRC_IP'] | default('')).split(',') | map('trim') | list,
            'TCP': item['TCP'] | default('') | split(', ') | map('split', '/') | list
          })] }}"
      loop: "{{ csv_data.list }}"


    - name: Display the resulting array with nested source IP loop
      debug:
        msg: "{{ processed_data }}"

    - name: Display nested loop over src_ip, dst_ip, and TCP
      debug:
        msg: "Source IP: {{ item[0] }}, Destination IP: {{ item[1] }}, TCP Port: {{ item[2] }}"
      with_nested:
        - "{{ processed_data[0].src_ip }}"
        - "{{ processed_data[0].dst_ip }}"
        - "{{ processed_data[0].TCP | flatten }}"
      




